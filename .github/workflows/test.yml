name: Build and Deploy

on:
  push:
    branches: ["main"] # Change to your default branch name (e.g., master)
  workflow_dispatch:   # Allows manual triggers

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (for TypeScript)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your preferred Node version
          cache: 'npm'

      - name: Setup Elm
        uses: jorelali/setup-elm@v6
        with:
          elm-version: '0.19.1'

      - name: Install dependencies
        run: npm install # Or whatever command you use to install JS/TS deps

      - name: Build with Make
        run: make build # Replace "build" with your specific Makefile target

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Replace 'dist' with the folder your Makefile generates (e.g., public, build)
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
